  <div id="header"></div>
  <div id="content">
    <div class="loading page-loading" style="padding:100px 20px">
      <div class="loading-spinner"></div>
      <p class="loading-main-text">クルーズ情報を読み込み中...</p>
      <div class="loading-progress-wrap"><div class="loading-progress-bar"></div></div>
      <p class="loading-done-text">完了！</p>
    </div>

  <script src="/assets/data/translations.js"></script>

  <script>
    document.getElementById('header').innerHTML = Components.header();
    document.getElementById('footer').innerHTML = Components.footer();

    const ref = new URLSearchParams(location.search).get('ref');
    if (!ref) {
      window.location.replace('search.html');
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html || '';
      return tmp.textContent || '';
    }

    function fmtPrice(v) {
      if (!v) return '-';
      return '$' + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
    }

    // 찜하기 (localStorage)
    function getWishlist() {
      try { return JSON.parse(localStorage.getItem('cl_wishlist') || '[]'); } catch { return []; }
    }
    function toggleWish(ref) {
      if (!ref) return;
      const list = getWishlist();
      const idx = list.indexOf(ref);
      if (idx >= 0) { list.splice(idx, 1); } else { list.push(ref); }
      localStorage.setItem('cl_wishlist', JSON.stringify(list));
      updateWishBtn(ref);
    }
    function updateWishBtn(ref) {
      const btn = document.getElementById('wishBtn');
      const icon = document.getElementById('wishIcon');
      if (!btn || !icon) return;
      const inList = getWishlist().includes(ref);
      icon.textContent = inList ? '♥' : '♡';
      btn.style.background = inList ? 'rgba(255,80,80,0.35)' : 'rgba(255,255,255,0.15)';
      btn.style.borderColor = inList ? '#ff5050' : 'rgba(255,255,255,0.5)';
    }

    // 로컬 JSON에서 ref로 크루즈 찾기 (cruises.json + featured.json + cruises-mini.json 순차 검색)
    async function findLocalCruise(ref) {
      try {
        const all = await API.loadAllCruises();
        const found = all.find(c => c.ref === ref);
        if (found) return found;
        // featured.json 에서도 검색
        try {
          const fr = await fetch('/assets/data/featured.json');
          const featured = await fr.json();
          const ff = featured.find(c => c.ref === ref);
          if (ff) return ff;
        } catch {}
        // cruises-mini.json 에서도 검색
        try {
          const mr = await fetch('/assets/data/cruises-mini.json');
          const mini = await mr.json();
          const mf = mini.find(c => c.ref === ref);
          if (mf) return mf;
        } catch {}
        return null;
      } catch { return null; }
    }

    async function load() {
      if (!ref) return;
      const content = document.getElementById('content');

      try {
        // ① 로컬 JSON + Widgety API 병렬 로드
        const urlShip = new URLSearchParams(location.search).get('ship');
        const [localCruise, holidayRaw] = await Promise.all([
          findLocalCruise(ref),
          API.getHoliday(ref).catch(() => null),   // Widgety 404 → null (폴백)
        ]);
        const shipLivePromise = urlShip ? API.getShipLive(urlShip) : null;

        // ② Widgety 실패 시 로컬 데이터로 최소 holiday 객체 생성
        let holiday = holidayRaw;
        if (!holiday && localCruise) {
          const lc = localCruise;
          const toPort = n => ({ name: n?.nameKo || n?.name || n || '' });
          holiday = {
            _fromLocal: true,
            _koreanTitle: lc.title || lc.shipTitleKo || lc.shipTitle || '',
            _portRouteKo: lc.portRoute || '',
            ship_title: lc.shipTitle || '',
            operator_title: lc.operator || '',
            start_date: lc.dateFrom || '',
            end_date: lc.dateTo || '',
            duration: lc.nights || 7,
            start_port: toPort(lc.startsAt),
            end_port: toPort(lc.endsAt),
            headline_prices: {
              cruise: {
                inside:  lc.priceInside  ? { amount: lc.priceInside  } : null,
                outside: lc.priceOutside ? { amount: lc.priceOutside } : null,
                balcony: lc.priceBalcony ? { amount: lc.priceBalcony } : null,
                suite:   lc.priceSuite   ? { amount: lc.priceSuite   } : null,
              }
            },
            itinerary: {
              days: (lc.ports || []).map((p, i) => ({
                day: i + 1,
                day_name: p.nameKo || p.name || '',
                locations: [{
                  name: p.name || '',
                  country: p.country || '',
                  arrival_time: '',
                  departure_time: '',
                  widgety_data: { images: [], description: '' }
                }]
              }))
            }
          };
        }

        if (!holiday) {
          content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>クルーズ情報が見つかりません</p></div>';
          return;
        }

        const shipSlug = urlShip || (typeof holiday.ship === 'string'
          ? holiday.ship.split('/ships/')[1]?.replace('.json', '')
          : null);

        // ③ 즉시 렌더 — 로컬 한국어 타이틀 우선 적용
        if (localCruise?.title) holiday._koreanTitle = localCruise.title;
        if (localCruise?.portRoute) holiday._portRouteKo = localCruise.portRoute;
        renderFromAPI(holiday, null, null);
        renderItinerary(holiday);
        renderPricing(holiday, null);
        initAllSliders();
        initDaySliders();

        // ④ shipLive 백그라운드 완료 후 선박 섹션만 업데이트
        const livePromise = shipLivePromise || (shipSlug ? API.getShipLive(shipSlug) : null);
        if (livePromise) {
          livePromise.then(shipLive => {
            if (!shipLive) return;
            const cruiseProxy = {
              shipTitle: holiday.ship_title || '',
              shipTitleKo: (typeof Translations !== 'undefined' ? Translations.shipName?.(holiday.ship_title || '') : '') || holiday.ship_title || '',
              operator: holiday.operator_title || '',
            };
            const liveDetail = normalizeShipLive(shipLive);
            updateShipSection(cruiseProxy, {}, null, liveDetail);
          }).catch(() => {});
        }
      } catch (e) {
        console.error('API fetch failed:', e);
        content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>データを読み込めません</p></div>';
      }
    }

    // 객실 카테고리 분류 (스위트→발코니→오션뷰→내측 순)
    function categorizeCabins(accommodations) {
      const CATS = [
        { id: 'suite',     label: '👑 スイートルーム', test: n => /suite|penthouse|villa|loft|grand|sky suite|owner/i.test(n) },
        { id: 'balcony',   label: '🌅 バルコニー客室', test: n => /balcony|veranda|terrace/i.test(n) },
        { id: 'oceanview', label: '🪟 オーシャンビューキャビン', test: n => /ocean.?view|sea.?view|outside|window|ocean.?front/i.test(n) },
        { id: 'inside',    label: '🚪 インサイドキャビン', test: () => true }, // デフォルト
      ];
      const buckets = Object.fromEntries(CATS.map(c => [c.id, []]));
      for (const a of accommodations) {
        const n = a.name || '';
        const cat = CATS.find(c => c.test(n));
        if (cat) buckets[cat.id].push(a);
      }
      return CATS.map(c => ({ ...c, items: buckets[c.id] })).filter(c => c.items.length > 0);
    }

    // 라이브 API 데이터 → detail 포맷으로 정규화
    function normalizeShipLive(sl) {
      if (!sl) return null;
      const cleanText = t => (t||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
      const mapItems = (arr, limit = 30) => (arr || []).slice(0, limit).map(item => {
        const rawName = item.name || '';
        const koName = Translations.facilityNameSmart(rawName);
        const rawDesc = cleanText(item.description || '').slice(0, 150);
        const koDesc = Translations.facilityKo[rawName]?.desc || Translations.koOnly(rawDesc) || '';
        return { name: koName, image: item.images?.[0]?.href || '', desc: koDesc };
      });
      const rawTeaser = cleanText(sl.teaser || '');
      const koTeaser = Translations.koOnly(rawTeaser) || '';
      return {
        dining: mapItems(sl.dining_options, 20),
        entertainment: mapItems(sl.entertainment_types, 30),
        health: mapItems(sl.health_fitness_types, 20),
        kids: mapItems(sl.kid_teen_types, 15),
        deckplans: mapItems(sl.deckplans, 20),
        accommodations: mapItems(sl.accomodation_types, 24),
        facts: sl.ship_facts || {},
        coverImage: sl.cover_image_href || sl.profile_image_href || '',
        teaser: koTeaser,
      };
    }

    // 선박 섹션 라이브 업데이트
    function updateShipSection(c, ship, detail, liveDetail) {
      const section = document.getElementById('ship-detail-section');
      if (!section) return;
      // 라이브 데이터가 더 풍부하면 교체
      const data = liveDetail || detail;
      if (!data) return;
      // facts 우선순위: liveDetail.facts > localShip
      const facts = liveDetail?.facts || {};
      const mergedShip = {
        ...ship,
        launchYear: facts.launch_year || ship.launchYear,
        grossTonnage: facts.gross_tonnage || ship.grossTonnage,
        capacity: facts.capacity || ship.capacity,
        crewCount: facts.crew_count || ship.crewCount,
        length: facts.length || ship.length,
        width: facts.width || ship.width,
        deckCount: facts.deck_count || ship.deckCount,
        cabinCount: facts.cabin_count || ship.cabinCount,
      };
      const newHtml = renderShipSection(c, mergedShip, detail, liveDetail);
      section.outerHTML = newHtml;
      initAllSliders();
    }

    function renderPage(c, ship, detail, holiday) {
      window._cruiseData = c;
      const nights = c.nights;
      const fromPrice = c.priceBalcony || c.priceOutside || c.priceInside;
      const priceStr = fromPrice ? API.formatPrice(fromPrice, c.currency) : 'お問い合わせ';
      const countries = (c.countriesKo || []).join(', ') || (c.countries || []).join(', ');

      document.title = `${c.title} - クルーズリンク`;
      // Dynamic OG tags for SEO
      const ref = new URLSearchParams(location.search).get('ref') || '';
      document.getElementById('ogTitle')?.setAttribute('content', `${c.title} - 크루즈링크`);
      document.getElementById('ogDesc')?.setAttribute('content', `${c.portRoute || ''} · ${c.nights || ''}박 · ${c.operator || ''} · $${c.priceInside || ''}~`);
      document.getElementById('ogImage')?.setAttribute('content', c.image || '');
      document.getElementById('ogUrl')?.setAttribute('content', `https://www.cruiselink.co.kr/cruise-view/?ref=${ref}`);
      document.getElementById('canonicalTag')?.setAttribute('href', `https://www.cruiselink.co.kr/cruise-view/?ref=${ref}`);

      let html = '';

      // === HERO ===
      html += `
      <section class="detail-hero">
        <div class="container">
          <div class="operator-name">${Translations.operatorName(c.operator)} · ${c.shipTitleKo || Translations.shipName(c.shipTitle)}</div>
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <h1 style="margin:0;">🚢 ${c.title}</h1>
            <button id="wishBtn" onclick="toggleWish('${c.ref||ref}')" style="background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.5);color:#fff;border-radius:50px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:all .2s;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.15)'">
              <span id="wishIcon">♡</span> お気に入り
            </button>
          </div>
          <div class="meta">
            <span>📅 ${API.formatDateKo(c.dateFrom)} ~ ${API.formatDateKo(c.dateTo)}</span>
            <span>🌙 ${nights}泊${nights+1}日</span>
            <span>🚢 ${c.shipTitleKo || Translations.shipName(c.shipTitle)}</span>
            <span>🌏 ${countries}</span>
          </div>
          <div class="detail-hero-tags">
            ${(c.hashtags||[]).slice(0,6).map(t => {
              if (!/[\uAC00-\uD7A3]/.test(t) && t.startsWith('#')) {
                const raw = t.slice(1);
                const ship = Translations.shipName(raw);
                if (ship !== raw) return `<span class="hero-tag">#${ship}</span>`;
                const port = Translations.portName(raw);
                if (port !== raw) return `<span class="hero-tag">#${port}</span>`;
                return '';
              }
              return `<span class="hero-tag">${t}</span>`;
            }).filter(Boolean).join('')}
          </div>
          <div class="price-big">${priceStr} <small>/ お一人様</small></div>
          <div class="hero-ctas cta-two-center">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 LINEで相談</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 オンラインお問い合わせ</button>
          </div>
        </div>
      </section>`;

      // === MAIN SHIP IMAGE ===
      if (ship.coverImage) {
        html += `<div class="container"><div class="main-ship-image"><img src="${ship.coverImage}" alt="${c.shipTitle}" loading="lazy"></div></div>`;
      }

      // === INFO BAR ===
      html += `
      <div class="container">
        <div class="info-bar">
          <div class="info-bar-item"><div class="label">🚢 客船</div><div class="value">${c.shipTitleKo || Translations.shipName(c.shipTitle)}</div></div>
          <div class="info-bar-item"><div class="label">🌙 期間</div><div class="value">${nights}泊${nights+1}日</div></div>
          <div class="info-bar-item"><div class="label">🚪 出発/到着</div><div class="value">${Translations.portName(c.startsAt?.nameKo || c.startsAt?.name || '')} → ${Translations.portName(c.endsAt?.nameKo || c.endsAt?.name || '')}</div></div>
          <div class="info-bar-item"><div class="label">💰 料金</div><div class="value" style="color:var(--orange)">${priceStr} <small style="font-size:.75em;font-weight:400;color:#888">/ お一人様</small></div></div>
        </div>
      </div>`;

      // === ITINERARY PLACEHOLDER ===
      html += `
      <section class="section" id="itinerary-section">
        <div class="container">
          <h2 class="section-title">🗓️ 詳細スケジュール</h2>
          <p class="section-subtitle">${Translations.portRoute(c.portRouteKo || c.portRoute || '')}</p>
          <div id="day-cards-container">
            <div class="loading"><div class="loading-spinner"></div><p>スケジュールデータを読み込み中...</p></div>
          </div>
        </div>
      </section>`;

      // === SHIP INFO ===
      html += renderShipSection(c, ship, detail);

      // === PRICING PLACEHOLDER ===
      html += `<section class="section" id="pricing-section"></section>`;

      // === INCLUDE/EXCLUDE ===
      html += `
      <section class="section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">📋 含まれるもの / 含まれないもの</h2>
          <div class="checklist-grid" style="margin-top:24px;max-width:700px;margin-left:auto;margin-right:auto">
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">✅ 含まれるもの</h3>
              <ul class="checklist included">
                <li>客室宿泊</li>
                <li>メインダイニング＆ビュッフェ（朝・昼・夕食）</li>
                <li>船上エンターテインメント（ショー・公演・プール）</li>
                <li>フィットネスセンター</li>
                <li>キッズ＆ティーンズクラブ</li>
                <li>ルームサービス（基本）</li>
                <li>寄港地シャトルバス（一部）</li>
              </ul>
            </div>
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">❌ 含まれないもの</h3>
              <ul class="checklist excluded">
                <li>航空券</li>
                <li>スペシャルティレストラン</li>
                <li>アルコール・飲料パッケージ</li>
                <li>寄港地観光（ shore excursion）</li>
                <li>スパ＆ビューティートリートメント</li>
                <li>Wi-Fiインターネットパッケージ</li>
                <li>ランドリーサービス</li>
                <li>旅行保険</li>
              </ul>
            </div>
          </div>
        </div>
      </section>`;

      // === CTA ===
      html += `
      <section class="cta-section">
        <div class="container">
          <h2>このクルーズにご興味はありますか？</h2>
          <p>クルーズリンクのスペシャリストが最適な客室と価格をご案内します。</p>
          <div class="cta-buttons cta-two">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 LINEで相談</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 オンラインお問い合わせ</button>
          </div>
        </div>
      </section>`;

      content.innerHTML = html;
      // 찜하기 버튼 초기 상태
      setTimeout(() => updateWishBtn(c.ref || new URLSearchParams(location.search).get('ref')), 50);
    }

    function renderShipSection(c, ship, detail, liveDetail = null) {
      // 시설 데이터: detail(로컬) 우선, 없으면 liveDetail(라이브 API)
      const facilityData = (detail?.dining?.length || detail?.entertainment?.length || detail?.deckplans?.length)
        ? detail : liveDetail;
      const shipName = c.shipTitleKo || c.shipTitle;
      const facts = liveDetail?.facts || {};

      // spec 값: liveDetail.facts 우선 → 로컬 ship 폴백
      const launchYear = facts.launch_year || ship?.launchYear;
      const grossTonnage = facts.gross_tonnage || ship?.grossTonnage;
      const capacity = facts.capacity || ship?.capacity;
      const crewCount = facts.crew_count || ship?.crewCount;
      const length = facts.length || ship?.length;
      const width = facts.width || ship?.width;
      const deckCount = facts.deck_count || ship?.deckCount;
      const cabinCount = facts.cabin_count || ship?.cabinCount;

      // teaser: liveDetail.teaser 우선 → Translations 폴백
      const teaser = liveDetail?.teaser
        || Translations.shipTeaser(c.shipTitle, c.shipTitleKo, c.operator, ship?.shipClass, capacity, launchYear)
        || '';

      let html = `
      <section class="section" id="ship-detail-section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">🚢 ${shipName}について</h2>
          ${teaser ? `<p class="section-subtitle" style="max-width:800px;margin:0 auto 24px;text-align:center">${teaser}</p>` : ''}
          <div class="spec-grid">`;

      const specs = [
        ['就航年', launchYear || '-'],
        ['総トン数', grossTonnage ? Number(grossTonnage).toLocaleString() + 't' : '-'],
        ['最大定員', capacity ? Number(capacity).toLocaleString() + '名' : '-'],
        ['乗組員', crewCount ? Number(crewCount).toLocaleString() + '名' : '-'],
        ['全長', length ? length + 'm' : '-'],
        ['全幅', width ? width + 'm' : '-'],
        ['デッキ', deckCount || '-'],
        ['客室数', cabinCount ? Number(cabinCount).toLocaleString() : '-'],
      ];
      specs.forEach(([label, value]) => {
        html += `<div class="spec-item"><div class="spec-value">${value}</div><div class="spec-label">${label}</div></div>`;
      });
      html += `</div>`;

      // ── 시설 탭 (다이닝 / 엔터테인먼트 / 스파 / 키즈 / 덱플랜) ──
      if (facilityData) {
        const tabs = [];
        if (facilityData.dining?.length)        tabs.push({id:'dining', label:`🍽️ ダイニング (${facilityData.dining.length})`,       items: facilityData.dining});
        if (facilityData.entertainment?.length)  tabs.push({id:'ent',    label:`🎭 エンターテインメント (${facilityData.entertainment.length})`, items: facilityData.entertainment});
        if (facilityData.health?.length)         tabs.push({id:'health', label:`💆 スパ・フィットネス (${facilityData.health.length})`,  items: facilityData.health});
        if (facilityData.kids?.length)           tabs.push({id:'kids',   label:`👶 キッズ (${facilityData.kids.length})`,            items: facilityData.kids});
        if (facilityData.deckplans?.length)      tabs.push({id:'decks',  label:`📐 デッキプラン (${facilityData.deckplans.length})`,     items: facilityData.deckplans});

        if (tabs.length) {

    function slideDayImg(slider, idx) {
      if (typeof slider === 'string') slider = document.getElementById(slider);
      if (!slider) return;
      const total = parseInt(slider.dataset.total) || 1;
      idx = (idx + total) % total;
      slider.dataset.current = idx;
      const slides = slider.querySelector('.day-img-slides');
      const wrap   = slider.querySelector('.day-img-wrap');
      if (slides && wrap) {
        // 픽셀 기반 이동 — wrap 너비 × idx
        slides.style.transform = `translateX(-${idx * wrap.offsetWidth}px)`;
      }
      slider.querySelectorAll('.day-dot').forEach((b, i) => {
        b.style.background = i === idx ? 'var(--navy)' : '#ccc';
        b.classList.toggle('day-dot-active', i === idx);
      });
    }

    function initDaySliders() {
      document.querySelectorAll('.day-img-slider').forEach(slider => {
        // 도트 클릭
        slider.querySelectorAll('.day-dot').forEach((dot, i) => {
          dot.addEventListener('click', () => slideDayImg(slider, i));
        });

        const wrap = slider.querySelector('.day-img-wrap');
        const slides = slider.querySelector('.day-img-slides');
        if (!wrap || !slides) return;

        // ── 터치 스와이프 (모바일) ──
        let _tx = 0, _ty = 0, _isHoriz = false, _started = false;

        wrap.addEventListener('touchstart', e => {
          _tx = e.touches[0].clientX;
          _ty = e.touches[0].clientY;
          _isHoriz = false;
          _started = true;
          slides.style.transition = 'none'; // 드래그 중 애니메이션 끄기
        }, { passive: true });

        wrap.addEventListener('touchmove', e => {
          if (!_started) return;
          const dx = e.touches[0].clientX - _tx;
          const dy = e.touches[0].clientY - _ty;
          if (!_isHoriz) {
            if (Math.abs(dx) > Math.abs(dy) + 3) {
              _isHoriz = true;
            } else if (Math.abs(dy) > Math.abs(dx) + 3) {
              _started = false; // 세로 스크롤이면 포기
              slides.style.transition = 'transform 0.35s ease';
              return;
            }
          }
          if (_isHoriz) {
            e.preventDefault();
            const cur = parseInt(slider.dataset.current || 0);
            slides.style.transform = `translateX(${-(cur * wrap.offsetWidth) + dx}px)`;
          }
        }, { passive: false });

        wrap.addEventListener('touchend', e => {
          if (!_started) return;
          _started = false;
          slides.style.transition = 'transform 0.35s ease';
          if (_isHoriz) {
            const dx = e.changedTouches[0].clientX - _tx;
            const cur = parseInt(slider.dataset.current || 0);
            if (Math.abs(dx) > 40) {
              slideDayImg(slider, cur + (dx < 0 ? 1 : -1));
            } else {
              // 제자리로
              slides.style.transform = `translateX(-${cur * wrap.offsetWidth}px)`;
            }
          }
          _isHoriz = false;
        }, { passive: true });

        // ── 마우스 드래그 (PC) ──
        let _mx = 0, _mdown = false;
        wrap.addEventListener('mousedown', e => {
          _mdown = true; _mx = e.pageX;
          slides.style.transition = 'none';
        });
        wrap.addEventListener('mousemove', e => {
          if (!_mdown) return;
          const dx = e.pageX - _mx;
          const cur = parseInt(slider.dataset.current || 0);
          slides.style.transform = `translateX(${-(cur * wrap.offsetWidth) + dx}px)`;
        });
        wrap.addEventListener('mouseup', e => {
          if (!_mdown) return;
          _mdown = false;
          slides.style.transition = 'transform 0.35s ease';
          const dx = e.pageX - _mx;
          const cur = parseInt(slider.dataset.current || 0);
          if (Math.abs(dx) > 40) {
            slideDayImg(slider, cur + (dx < 0 ? 1 : -1));
          } else {
            slides.style.transform = `translateX(-${cur * wrap.offsetWidth}px)`;
          }
        });
        wrap.addEventListener('mouseleave', () => {
          if (!_mdown) return;
          _mdown = false;
          slides.style.transition = 'transform 0.35s ease';
          const cur = parseInt(slider.dataset.current || 0);
          slides.style.transform = `translateX(-${cur * wrap.offsetWidth}px)`;
        });

        // ── 이미지 드래그 방지 ──
        wrap.querySelectorAll('img').forEach(img => {
          img.addEventListener('dragstart', e => e.preventDefault());
        });
      });
    }

    function initSlider(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const slides = container.querySelector('.facility-slides');
      const dots = container.querySelectorAll('.slider-dot');
      const total = dots.length;
      if (total === 0) return;
      let current = 0;

      function goTo(i) {
        current = (i + total) % total;
        slides.style.transform = `translateX(-${current * 100}%)`;
        dots.forEach((d, idx) => d.classList.toggle('active', idx === current));
      }

      container.querySelector('.slider-prev')?.addEventListener('click', () => goTo(current - 1));
      container.querySelector('.slider-next')?.addEventListener('click', () => goTo(current + 1));
      dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));

      // 터치 스와이프
      let _tx = 0, _ty = 0, _swiping = false;
      slides.addEventListener('touchstart', e => {
        _tx = e.touches[0].clientX;
        _ty = e.touches[0].clientY;
        _swiping = false;
      }, { passive: true });
      slides.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX - _tx;
        const dy = e.touches[0].clientY - _ty;
        // 수평 스와이프가 확실하면 세로 스크롤 막기
        if (!_swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
          _swiping = true;
        }
        if (_swiping) e.preventDefault();
      }, { passive: false });
      slides.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - _tx;
        if (_swiping && Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
        _swiping = false;
      });
    }

    function initAllSliders() {
      document.querySelectorAll('.facility-slider').forEach(el => initSlider(el.id));
      initDaySliders();
    }

    function switchShipTab(el, panelId) {

  <script>
    // ── Mobile Inquiry Bar ──
    function toggleMIB() {
      const bar = document.getElementById('mib');
      const isOpen = bar.classList.toggle('open');
      document.body.classList.toggle('mib-open', isOpen);
    }

    function closeMIB() {
      document.getElementById('mib').classList.remove('open');
      document.body.classList.remove('mib-open');
    }

    // 제목 고정값 — 동적 업데이트 불필요

    // ── MIB 스와이프 제스처 ──
    (function() {
      let startY = 0;
      const handle = document.getElementById('mibHandle');
      if (!handle) return;

      handle.addEventListener('touchstart', function(e) {
        startY = e.touches[0].clientY;
      }, { passive: true });

      handle.addEventListener('touchend', function(e) {
        const endY = e.changedTouches[0].clientY;
        const diff = startY - endY; // 양수 = 위로 스와이프, 음수 = 아래로 스와이프
        const mib = document.getElementById('mib');
        if (diff > 30) {
          // 위로 스와이프 → 열기
          mib.classList.add('open');
          document.body.classList.add('mib-open');
        } else if (diff < -30) {
          // 아래로 스와이프 → 닫기
          mib.classList.remove('open');
          document.body.classList.remove('mib-open');
        }
      }, { passive: true });
    })();

    // ── MIB 공유하기 ──
    function mibShareUrl() {
      // OG 태그가 있는 정적 파일 URL 생성 (카카오톡 프리뷰용)
      const params = new URLSearchParams(location.search);
      const ref = params.get('ref');
      const url = ref
        ? 'https://www.cruiselink.co.kr/c/' + ref + '.html'
        : location.href;
      const titleEl = document.querySelector('.detail-hero h1');
      const title = titleEl ? titleEl.innerText.replace('🚢 ','') : document.title;

      // Web Share API 지원 시 (모바일 네이티브 공유)
      if (navigator.share) {
        navigator.share({ title: '🚢 ' + title, url }).catch(() => {});
        return;
      }
      // fallback: URL 복사
      navigator.clipboard.writeText(url).then(() => {
        showMibToast('🔗 링크가 복사됐습니다!');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showMibToast('🔗 링크가 복사됐습니다!');
      });
    }

    function showMibToast(msg) {
      let t = document.getElementById('mibToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'mibToast';
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a2540;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;display:none;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2200);
    }
  </script>

    let _lbImages = [];

    function openLightbox(src, caption, allImgs, idx) {
      _lbImages = allImgs || [{ src, caption }];
      _lbIdx = idx ?? 0;

      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      // 키보드

    function _renderLb() {
      const item = _lbImages[_lbIdx];
      document.getElementById('lbImg').src = item.src;
      document.getElementById('lbImg').alt = item.caption || '';
      document.getElementById('lbCaption').textContent = item.caption || '';
      const total = _lbImages.length;
      document.getElementById('lbCounter').textContent = total > 1 ? `${_lbIdx + 1} / ${total}` : '';
      const showNav = total > 1;
      document.getElementById('lbPrev').style.display = showNav ? 'flex' : 'none';
      document.getElementById('lbNext').style.display = showNav ? 'flex' : 'none';

      _renderLb();

      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lbImg').src = '';
      document.body.style.overflow = '';
      document.removeEventListener('keydown', _lbKey);
    }

    function _lbKey(e) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'ArrowLeft') lbNav(-1);
    }

    // 이벤트 위임 — facility slides + cabin cards 이미지 클릭
    document.addEventListener('click', function(e) {
      const img = e.target.closest('.facility-slide img, .cabin-card img');
      if (!img) return;
      e.stopPropagation();

      // 같은 슬라이더 내 모든 이미지 수집
      const slide = img.closest('.facility-slide, .cabin-card');
      const slider = img.closest('.facility-slider, .cabin-grid');
      let allImgs, idx;

      if (slider) {
        const imgs = [...slider.querySelectorAll('img')].filter(i => i.src && !i.src.includes('data:'));
        allImgs = imgs.map(i => ({ src: i.src, caption: i.alt || '' }));
        idx = imgs.indexOf(img);
      } else {
        allImgs = [{ src: img.src, caption: img.alt || '' }];
        idx = 0;
      }

      openLightbox(img.src, img.alt || '', allImgs, Math.max(0, idx));
    });

    // 스와이프 (모바일)
    let _tsX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', e => { _tsX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('lightbox').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - _tsX;
      if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
    });
  </script>

  function patch(el){if(!el||!el.innerHTML)return;var h=el.innerHTML;for(var k in M)h=h.split(k).join(M[k]);h=h.replace(/(\d+)박\s*(\d+)일/g,'$1泊$2日');h=h.replace(/(\d+)박/g,'$1泊');h=h.replace(/(\d+)일차/g,'Day $1');el.innerHTML=h;}
