<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>크루즈링크 관리자 로그인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: #0d1b6e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo .icon {
    font-size: 48px;
    display: block;
    margin-bottom: 8px;
  }
  .logo h1 {
    color: #1a237e;
    font-size: 20px;
    font-weight: 700;
  }
  .logo p {
    color: #888;
    font-size: 13px;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #444;
    margin-bottom: 6px;
    font-weight: 600;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s;
    outline: none;
    font-family: inherit;
  }
  input:focus {
    border-color: #1a237e;
  }
  .btn-login {
    width: 100%;
    padding: 13px;
    background: #1a237e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
    font-family: inherit;
  }
  .btn-login:hover {
    background: #283593;
  }
  .error-msg {
    display: none;
    background: #ffebee;
    color: #c62828;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
  }
  .error-msg.show {
    display: block;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <span class="icon">🚢</span>
    <h1>크루즈링크 관리자</h1>
    <p>CruiseLink Admin Portal</p>
  </div>
  <div class="form-group">
    <label>이메일</label>
    <input type="email" id="emailInput" placeholder="관리자 이메일 입력" autocomplete="email">
  </div>
  <div class="form-group">
    <label>비밀번호</label>
    <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">로그인</button>
  <div class="error-msg" id="errorMsg">이메일 또는 비밀번호가 올바르지 않습니다</div>
</div>

<script>
  function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pw = document.getElementById('pwInput').value;
    const errEl = document.getElementById('errorMsg');

    if (email === 'info@cruiselink.co.kr' && pw === 'Cruiselink2025!') {
      sessionStorage.setItem('cl_admin', '1');
      location.href = 'dashboard.html';
    } else {
      errEl.classList.add('show');
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
    }
  }

  // Enter key submits
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
