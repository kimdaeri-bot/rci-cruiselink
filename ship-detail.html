<!DOCTYPE html>
<html lang="ko">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>선박 상세 - 크루즈링크</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="shortcut icon" href="favicon.ico"><text y='.9em' font-size='90'>🚢</text></svg>">
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K4PPLZNG"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager -->

  <div id="header"></div>
  <div id="content">
    <div class="loading" style="padding:100px 20px"><div class="loading-spinner"></div><p>선박 정보를 불러오는 중...</p></div>
  </div>
  <div id="ctaSection"></div>
  <div id="footer"></div>

  <script src="assets/data/translations.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    document.getElementById('header').innerHTML = Components.header('ships');
    document.getElementById('footer').innerHTML = Components.footer();
    document.getElementById('ctaSection').innerHTML = Components.ctaSection();

    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { document.getElementById('content').innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>잘못된 접근입니다</p></div>'; }

    async function load() {
      if (!slug) return;
      const content = document.getElementById('content');

      try {
        // Load basic specs from local JSON (instant)
        const localShip = await API.getLocalShip(slug);
        if (!localShip) { content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>선박을 찾을 수 없습니다</p></div>'; return; }

        document.title = `${localShip.title} - 크루즈링크`;
        let html = '';

        // Hero
        html += `<div class="ship-hero">
          <img src="${localShip.coverImage}" alt="${localShip.title}">
          <div class="ship-hero-overlay">
            <p>${localShip.operator} · ${localShip.shipClass}</p>
            <h1>${localShip.title}</h1>
          </div>
        </div>`;

        // Specs from local JSON
        html += `<section class="section"><div class="container">
          <div class="spec-grid">`;
        const specs = [
          ['취항연도', localShip.launchYear || '-'], ['리뉴얼', localShip.refitYear || '-'],
          ['총톤수', localShip.grossTonnage ? localShip.grossTonnage.toLocaleString() + 't' : '-'],
          ['전장', localShip.length ? localShip.length + 'm' : '-'],
          ['최대정원', localShip.capacity ? localShip.capacity.toLocaleString() + '명' : '-'],
          ['승무원', localShip.crewCount ? localShip.crewCount.toLocaleString() + '명' : '-'],
          ['데크', localShip.deckCount ? localShip.deckCount + '개' : '-'],
          ['객실', localShip.cabinCount ? localShip.cabinCount.toLocaleString() + '실' : '-'],
        ];
        specs.forEach(([l, v]) => html += `<div class="spec-item"><div class="spec-label">${l}</div><div class="spec-value">${v}</div></div>`);
        html += `</div>`;

        // Tabs placeholder (will be filled by live API)
        html += `<div id="shipTabs"><div class="loading" style="padding:20px"><div class="loading-spinner"></div><p>시설 정보를 불러오는 중...</p></div></div>`;
        html += `</div></section>`;

        // Video
        if (localShip.videoUrl) {
          const vid = localShip.videoUrl.match(/(?:v=|\/)([\w-]{11})/)?.[1];
          if (vid) {
            html += `<section class="section" style="background:var(--gray-50)"><div class="container">
              <h2 class="section-title">선박 영상</h2>
              <div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin-top:24px">
                <iframe src="https://www.youtube.com/embed/${vid}" style="position:absolute;top:0;left:0;width:100%;height:100%" frameborder="0" allowfullscreen loading="lazy"></iframe>
              </div>
            </div></section>`;
          }
        }

        // Cruises from local JSON
        html += `<section class="section"><div class="container">
          <h2 class="section-title">${localShip.title} 크루즈 일정</h2>
          <p class="section-subtitle">출발일 기준 정렬</p>
          <div id="shipCruises"><div class="loading"><div class="loading-spinner"></div><p>크루즈 일정을 불러오는 중...</p></div></div>
        </div></section>`;

        content.innerHTML = html;

        // Load cruises from local JSON (instant)
        loadShipCruises();

        // Load facilities from live API (async, non-blocking)
        loadFacilities();

      } catch (e) {
        console.error(e);
        content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>데이터를 불러올 수 없습니다</p></div>';
      }
    }

    async function loadShipCruises() {
      const container = document.getElementById('shipCruises');
      const cruises = await API.getShipCruises(slug);
      container.innerHTML = cruises.length
        ? cruises.slice(0, 30).map(c => Components.localCruiseItem(c)).join('')
        : '<div class="empty-state"><span class="emoji">📅</span><p>예정된 크루즈가 없습니다</p></div>';
    }

    async function loadFacilities() {
      const tabsContainer = document.getElementById('shipTabs');
      try {
        const s = await API.getShipLive(slug);
        if (!s) { tabsContainer.innerHTML = ''; return; }

        const tabData = [];
        if (s.teaser || s.introduction) tabData.push({ id: 'overview', label: '📋 개요', content: s.teaser || s.introduction });
        if (s.accomodation_types?.length) tabData.push({ id: 'cabin', label: '🛏️ 객실', content: '__cabins__' });
        if (s.dining?.intro) tabData.push({ id: 'dining', label: '🍽️ 다이닝', content: s.dining.intro });
        if (s.entertainment?.intro) tabData.push({ id: 'entertainment', label: '🎭 엔터테인먼트', content: s.entertainment.intro });
        if (s.health_and_fitness?.intro) tabData.push({ id: 'spa', label: '💆 스파', content: s.health_and_fitness.intro });
        if (s.kids_and_teens?.intro) tabData.push({ id: 'kids', label: '👶 키즈', content: s.kids_and_teens.intro });

        if (tabData.length === 0) { tabsContainer.innerHTML = ''; return; }

        let html = `<div class="tabs">${tabData.map((t, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchTab('${t.id}',this)">${t.label}</button>`).join('')}</div>`;
        tabData.forEach((t, i) => {
          let c = t.content;
          if (c === '__cabins__') {
            c = '<div class="cabin-grid">' + s.accomodation_types.map(at => {
              const img = at.images?.[0]?.href || '';
              return `<div class="cabin-card">${img ? `<img src="${img}" alt="${at.name}" loading="lazy">` : ''}<div class="cabin-card-body"><h4>${at.name}</h4></div></div>`;
            }).join('') + '</div>';
          }
          html += `<div class="tab-content ${i === 0 ? 'active' : ''}" id="tab-${t.id}">${c}</div>`;
        });
        tabsContainer.innerHTML = html;
      } catch (e) {
        tabsContainer.innerHTML = '';
      }
    }

    function switchTab(id, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + id)?.classList.add('active');
    }

    load();
  </script>
</body>
</html>
