<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" id="canonicalTag" href="https://www.cruiselink.co.kr/cruise-view.html">
  <meta property="og:site_name" content="크루즈링크">
  <meta property="og:type" content="product">
  <meta id="ogTitle" property="og:title" content="크루즈링크 - 크루즈 상품 상세">
  <meta id="ogDesc" property="og:description" content="크루즈링크에서 최적의 크루즈 여행을 찾아보세요.">
  <meta id="ogImage" property="og:image" content="https://www.cruiselink.co.kr/assets/images/og-image.jpg">
  <meta id="ogUrl" property="og:url" content="https://www.cruiselink.co.kr/cruise-view.html">
  <title>크루즈 상세 - 크루즈링크</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
</head>
<body>
  <div id="header"></div>
  <div id="content">
    <div class="loading page-loading" style="padding:100px 20px">
      <div class="loading-spinner"></div>
      <p class="loading-main-text">실시간 크루즈 검색 중...</p>
      <div class="loading-progress-wrap"><div class="loading-progress-bar"></div></div>
      <p class="loading-done-text">완료!</p>
    </div>
  </div>
  <div id="footer"></div>

  <script src="assets/data/translations.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    document.getElementById('header').innerHTML = Components.header();
    document.getElementById('footer').innerHTML = Components.footer();

    const ref = new URLSearchParams(location.search).get('ref');
    if (!ref) {
      document.getElementById('content').innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>잘못된 접근입니다</p></div>';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html || '';
      return tmp.textContent || '';
    }

    function fmtPrice(v) {
      if (!v) return '-';
      return '$' + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
    }

    // 로컬 JSON에서 ref로 크루즈 찾기 (한국어 타이틀 우선 사용)
    async function findLocalCruise(ref) {
      try {
        const all = await API.loadAllCruises();
        return all.find(c => c.ref === ref) || null;
      } catch { return null; }
    }

    async function load() {
      if (!ref) return;
      const content = document.getElementById('content');

      try {
        // ① 로컬 JSON + Widgety API 병렬 로드
        const urlShip = new URLSearchParams(location.search).get('ship');
        const [localCruise, holiday] = await Promise.all([
          findLocalCruise(ref),
          API.getHoliday(ref),
        ]);
        const shipLivePromise = urlShip ? API.getShipLive(urlShip) : null;
        if (!holiday) {
          content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>크루즈 정보를 찾을 수 없습니다</p></div>';
          return;
        }

        const shipSlug = urlShip || (typeof holiday.ship === 'string'
          ? holiday.ship.split('/ships/')[1]?.replace('.json', '')
          : null);

        // ③ 즉시 렌더 — 로컬 한국어 타이틀 우선 적용
        if (localCruise?.title) holiday._koreanTitle = localCruise.title;
        if (localCruise?.portRoute) holiday._portRouteKo = localCruise.portRoute;
        renderFromAPI(holiday, null, null);
        renderItinerary(holiday);
        renderPricing(holiday, null);
        initAllSliders();
        initDaySliders();

        // ④ shipLive 백그라운드 완료 후 선박 섹션만 업데이트
        const livePromise = shipLivePromise || (shipSlug ? API.getShipLive(shipSlug) : null);
        if (livePromise) {
          livePromise.then(shipLive => {
            if (!shipLive) return;
            const cruiseProxy = {
              shipTitle: holiday.ship_title || '',
              shipTitleKo: (typeof Translations !== 'undefined' ? Translations.shipName?.(holiday.ship_title || '') : '') || holiday.ship_title || '',
              operator: holiday.operator_title || '',
            };
            const liveDetail = normalizeShipLive(shipLive);
            updateShipSection(cruiseProxy, {}, null, liveDetail);
          }).catch(() => {});
        }
      } catch (e) {
        console.error('API fetch failed:', e);
        content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>데이터를 불러올 수 없습니다</p></div>';
      }
    }

    // 객실 카테고리 분류 (스위트→발코니→오션뷰→내측 순)
    function categorizeCabins(accommodations) {
      const CATS = [
        { id: 'suite',     label: '👑 스위트',  test: n => /suite|penthouse|villa|loft|grand|sky suite|owner/i.test(n) },
        { id: 'balcony',   label: '🌅 발코니',  test: n => /balcony|veranda|terrace/i.test(n) },
        { id: 'oceanview', label: '🪟 오션뷰',  test: n => /ocean.?view|sea.?view|outside|window|ocean.?front/i.test(n) },
        { id: 'inside',    label: '🚪 내측',   test: () => true }, // 기본값
      ];
      const buckets = Object.fromEntries(CATS.map(c => [c.id, []]));
      for (const a of accommodations) {
        const n = a.name || '';
        const cat = CATS.find(c => c.test(n));
        if (cat) buckets[cat.id].push(a);
      }
      return CATS.map(c => ({ ...c, items: buckets[c.id] })).filter(c => c.items.length > 0);
    }

    // 라이브 API 데이터 → detail 포맷으로 정규화
    function normalizeShipLive(sl) {
      if (!sl) return null;
      const cleanText = t => (t||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
      const mapItems = (arr, limit = 30) => (arr || []).slice(0, limit).map(item => {
        const rawName = item.name || '';
        const koName = Translations.facilityNameSmart(rawName);
        const rawDesc = cleanText(item.description || '').slice(0, 150);
        const koDesc = Translations.facilityKo[rawName]?.desc || Translations.koOnly(rawDesc) || '';
        return { name: koName, image: item.images?.[0]?.href || '', desc: koDesc };
      });
      const rawTeaser = cleanText(sl.teaser || '');
      const koTeaser = Translations.koOnly(rawTeaser) || '';
      return {
        dining: mapItems(sl.dining_options, 20),
        entertainment: mapItems(sl.entertainment_types, 30),
        health: mapItems(sl.health_fitness_types, 20),
        kids: mapItems(sl.kid_teen_types, 15),
        deckplans: mapItems(sl.deckplans, 20),
        accommodations: mapItems(sl.accomodation_types, 24),
        facts: sl.ship_facts || {},
        coverImage: sl.cover_image_href || sl.profile_image_href || '',
        teaser: koTeaser,
      };
    }

    // 선박 섹션 라이브 업데이트
    function updateShipSection(c, ship, detail, liveDetail) {
      const section = document.getElementById('ship-detail-section');
      if (!section) return;
      // 라이브 데이터가 더 풍부하면 교체
      const data = liveDetail || detail;
      if (!data) return;
      // facts 우선순위: liveDetail.facts > localShip
      const facts = liveDetail?.facts || {};
      const mergedShip = {
        ...ship,
        launchYear: facts.launch_year || ship.launchYear,
        grossTonnage: facts.gross_tonnage || ship.grossTonnage,
        capacity: facts.capacity || ship.capacity,
        crewCount: facts.crew_count || ship.crewCount,
        length: facts.length || ship.length,
        width: facts.width || ship.width,
        deckCount: facts.deck_count || ship.deckCount,
        cabinCount: facts.cabin_count || ship.cabinCount,
      };
      const newHtml = renderShipSection(c, mergedShip, detail, liveDetail);
      section.outerHTML = newHtml;
      initAllSliders();
    }

    function renderPage(c, ship, detail, holiday) {
      window._cruiseData = c;
      const nights = c.nights;
      const fromPrice = c.priceBalcony || c.priceOutside || c.priceInside;
      const priceStr = fromPrice ? API.formatPrice(fromPrice, c.currency) : '문의';
      const countries = (c.countriesKo || []).join(', ') || (c.countries || []).join(', ');

      document.title = `${c.title} - 크루즈링크`;
      // Dynamic OG tags for SEO
      const ref = new URLSearchParams(location.search).get('ref') || '';
      document.getElementById('ogTitle')?.setAttribute('content', `${c.title} - 크루즈링크`);
      document.getElementById('ogDesc')?.setAttribute('content', `${c.portRoute || ''} · ${c.nights || ''}박 · ${c.operator || ''} · $${c.priceInside || ''}~`);
      document.getElementById('ogImage')?.setAttribute('content', c.image || '');
      document.getElementById('ogUrl')?.setAttribute('content', `https://www.cruiselink.co.kr/cruise-view.html?ref=${ref}`);
      document.getElementById('canonicalTag')?.setAttribute('href', `https://www.cruiselink.co.kr/cruise-view.html?ref=${ref}`);

      let html = '';

      // === HERO ===
      html += `
      <section class="detail-hero">
        <div class="container">
          <div class="operator-name">${Translations.operatorName(c.operator)} · ${c.shipTitleKo || Translations.shipName(c.shipTitle)}</div>
          <h1>🚢 ${c.title}</h1>
          <div class="meta">
            <span>📅 ${API.formatDateKo(c.dateFrom)} ~ ${API.formatDateKo(c.dateTo)}</span>
            <span>🌙 ${nights}박 ${nights+1}일</span>
            <span>🚢 ${c.shipTitleKo || Translations.shipName(c.shipTitle)}</span>
            <span>🌏 ${countries}</span>
          </div>
          <div class="detail-hero-tags">
            ${(c.hashtags||[]).slice(0,6).map(t => {
              if (!/[\uAC00-\uD7A3]/.test(t) && t.startsWith('#')) {
                const raw = t.slice(1);
                const ship = Translations.shipName(raw);
                if (ship !== raw) return `<span class="hero-tag">#${ship}</span>`;
                const port = Translations.portName(raw);
                if (port !== raw) return `<span class="hero-tag">#${port}</span>`;
                return '';
              }
              return `<span class="hero-tag">${t}</span>`;
            }).filter(Boolean).join('')}
          </div>
          <div class="price-big">${priceStr} <small>/1인</small></div>
          <div class="hero-ctas cta-two-center">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 카카오톡 상담</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 온라인 문의</button>
          </div>
        </div>
      </section>`;

      // === MAIN SHIP IMAGE ===
      if (ship.coverImage) {
        html += `<div class="container"><div class="main-ship-image"><img src="${ship.coverImage}" alt="${c.shipTitle}" loading="lazy"></div></div>`;
      }

      // === INFO BAR ===
      html += `
      <div class="container">
        <div class="info-bar">
          <div class="info-bar-item"><div class="label">🚢 선박</div><div class="value">${c.shipTitleKo || Translations.shipName(c.shipTitle)}</div></div>
          <div class="info-bar-item"><div class="label">🌙 기간</div><div class="value">${nights}박 ${nights+1}일</div></div>
          <div class="info-bar-item"><div class="label">🚪 출발/도착</div><div class="value">${Translations.portName(c.startsAt?.nameKo || c.startsAt?.name || '')} → ${Translations.portName(c.endsAt?.nameKo || c.endsAt?.name || '')}</div></div>
          <div class="info-bar-item"><div class="label">💰 요금</div><div class="value" style="color:var(--orange)">${priceStr} <small style="font-size:.75em;font-weight:400;color:#888">/1인</small></div></div>
        </div>
      </div>`;

      // === ITINERARY PLACEHOLDER ===
      html += `
      <section class="section" id="itinerary-section">
        <div class="container">
          <h2 class="section-title">🗓️ 상세 일정</h2>
          <p class="section-subtitle">${Translations.portRoute(c.portRouteKo || c.portRoute || '')}</p>
          <div id="day-cards-container">
            <div class="loading"><div class="loading-spinner"></div><p>일정 데이터를 불러오는 중...</p></div>
          </div>
        </div>
      </section>`;

      // === SHIP INFO ===
      html += renderShipSection(c, ship, detail);

      // === PRICING PLACEHOLDER ===
      html += `<section class="section" id="pricing-section"></section>`;

      // === INCLUDE/EXCLUDE ===
      html += `
      <section class="section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">📋 포함 / 불포함 사항</h2>
          <div class="checklist-grid" style="margin-top:24px;max-width:700px;margin-left:auto;margin-right:auto">
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">✅ 포함 사항</h3>
              <ul class="checklist included">
                <li>객실 숙박</li>
                <li>메인 레스토랑 & 뷔페 식사 (조식·중식·석식)</li>
                <li>선상 엔터테인먼트 (쇼, 공연, 수영장)</li>
                <li>피트니스 센터</li>
                <li>키즈 & 틴즈 클럽 프로그램</li>
                <li>객실 룸서비스 (기본)</li>
                <li>기항지 셔틀버스 (일부)</li>
              </ul>
            </div>
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">❌ 불포함 사항</h3>
              <ul class="checklist excluded">
                <li>항공편</li>
                <li>스페셜티 레스토랑</li>
                <li>주류 및 음료 패키지</li>
                <li>기항지 관광 (Shore Excursion)</li>
                <li>스파 & 뷰티 트리트먼트</li>
                <li>Wi-Fi 인터넷 패키지</li>
                <li>세탁 서비스</li>
                <li>여행자 보험</li>
              </ul>
            </div>
          </div>
        </div>
      </section>`;

      // === CTA ===
      html += `
      <section class="cta-section">
        <div class="container">
          <h2>이 크루즈가 마음에 드셨나요?</h2>
          <p>크루즈링크 전문 상담원이 최적의 객실과 가격을 안내해드립니다.</p>
          <div class="cta-buttons cta-two">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 카카오톡 상담</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 온라인 문의</button>
          </div>
        </div>
      </section>`;

      content.innerHTML = html;
    }

    function renderShipSection(c, ship, detail, liveDetail = null) {
      // 시설 데이터: detail(로컬) 우선, 없으면 liveDetail(라이브 API)
      const facilityData = (detail?.dining?.length || detail?.entertainment?.length || detail?.deckplans?.length)
        ? detail : liveDetail;
      const shipName = c.shipTitleKo || c.shipTitle;
      const facts = liveDetail?.facts || {};

      // spec 값: liveDetail.facts 우선 → 로컬 ship 폴백
      const launchYear = facts.launch_year || ship?.launchYear;
      const grossTonnage = facts.gross_tonnage || ship?.grossTonnage;
      const capacity = facts.capacity || ship?.capacity;
      const crewCount = facts.crew_count || ship?.crewCount;
      const length = facts.length || ship?.length;
      const width = facts.width || ship?.width;
      const deckCount = facts.deck_count || ship?.deckCount;
      const cabinCount = facts.cabin_count || ship?.cabinCount;

      // teaser: liveDetail.teaser 우선 → Translations 폴백
      const teaser = liveDetail?.teaser
        || Translations.shipTeaser(c.shipTitle, c.shipTitleKo, c.operator, ship?.shipClass, capacity, launchYear)
        || '';

      let html = `
      <section class="section" id="ship-detail-section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">🚢 ${shipName} 소개</h2>
          ${teaser ? `<p class="section-subtitle" style="max-width:800px;margin:0 auto 24px;text-align:center">${teaser}</p>` : ''}
          <div class="spec-grid">`;

      const specs = [
        ['취항연도', launchYear || '-'],
        ['총톤수', grossTonnage ? Number(grossTonnage).toLocaleString() + 't' : '-'],
        ['최대정원', capacity ? Number(capacity).toLocaleString() + '명' : '-'],
        ['승무원', crewCount ? Number(crewCount).toLocaleString() + '명' : '-'],
        ['전장', length ? length + 'm' : '-'],
        ['전폭', width ? width + 'm' : '-'],
        ['데크', deckCount ? deckCount + '개' : '-'],
        ['객실', cabinCount ? Number(cabinCount).toLocaleString() + '실' : '-'],
      ];
      specs.forEach(([label, value]) => {
        html += `<div class="spec-item"><div class="spec-value">${value}</div><div class="spec-label">${label}</div></div>`;
      });
      html += `</div>`;

      // ── 시설 탭 (다이닝 / 엔터테인먼트 / 스파 / 키즈 / 덱플랜) ──
      if (facilityData) {
        const tabs = [];
        if (facilityData.dining?.length)        tabs.push({id:'dining', label:`🍽️ 다이닝 (${facilityData.dining.length})`,       items: facilityData.dining});
        if (facilityData.entertainment?.length)  tabs.push({id:'ent',    label:`🎭 엔터테인먼트 (${facilityData.entertainment.length})`, items: facilityData.entertainment});
        if (facilityData.health?.length)         tabs.push({id:'health', label:`💆 스파·피트니스 (${facilityData.health.length})`,  items: facilityData.health});
        if (facilityData.kids?.length)           tabs.push({id:'kids',   label:`👶 키즈 (${facilityData.kids.length})`,            items: facilityData.kids});
        if (facilityData.deckplans?.length)      tabs.push({id:'decks',  label:`📐 덱플랜 (${facilityData.deckplans.length})`,     items: facilityData.deckplans});

        if (tabs.length) {
          html += `<div class="ship-tabs" style="margin-top:40px">`;
          html += `<div class="tabs" style="flex-wrap:wrap;gap:4px 0">`;
          tabs.forEach((t, i) => {
            html += `<button class="tab-btn ${i===0?'active':''}" onclick="switchShipTab(this,'ship-panel-${t.id}')">${t.label}</button>`;
          });
          html += `</div>`;

          tabs.forEach((t, i) => {
            const sliderId = 'slider-' + t.id;
            const items = t.items.slice(0, t.id === 'decks' ? 30 : 20);
            html += `<div class="tab-content ${i===0?'active':''}" id="ship-panel-${t.id}">`;
            html += `<div class="facility-slider" id="${sliderId}">`;
            html += `<div class="facility-slides">`;
            items.forEach(item => {
              // item.name은 normalizeShipLive에서 이미 한글화됨
              const name = item.name;
              const desc = item.desc || '';
              html += `<div class="facility-slide">`;
              if (item.image) html += `<img src="${item.image}" alt="${name}" loading="lazy">`;
              html += `<div class="facility-slide-body"><div class="facility-slide-name">${name}</div>`;
              if (desc) html += `<div class="facility-slide-desc">${desc}</div>`;
              html += `</div></div>`;
            });
            html += `</div>`;
            if (items.length > 1) {
              html += `<button class="slider-btn slider-prev">◀</button><button class="slider-btn slider-next">▶</button>`;
              html += `<div class="slider-dots">${items.map((_, idx) => `<button class="slider-dot${idx===0?' active':''}" data-idx="${idx}"></button>`).join('')}</div>`;
            }
            html += `</div></div>`;
          });
          html += `</div>`;
        }

        // ── 객실 타입 (카테고리별 행 슬라이더) ──
        if (facilityData.accommodations?.length) {
          const cabinCats = categorizeCabins(facilityData.accommodations);
          if (cabinCats.length) {
            html += `<h3 style="font-size:1.2rem;font-weight:700;color:var(--navy);margin:40px 0 8px">🛏️ 객실 타입</h3>`;
            cabinCats.forEach(cat => {
              const rowId = 'cabin-row-' + cat.id;
              html += `<div style="margin-bottom:4px;padding:8px 0 4px;border-top:1px solid var(--gray-200)">`;
              html += `<div style="font-size:0.85rem;font-weight:700;color:var(--navy);margin-bottom:8px">${cat.label} <span style="font-weight:400;color:var(--gray-500)">(${cat.items.length})</span></div>`;
              html += `<div class="facility-slider" id="${rowId}">`;
              html += `<div class="facility-slides">`;
              cat.items.forEach(a => {
                const aName = Translations.accommodationName(a.name);
                const descText = a.desc || Translations.cabinDescKo(cat.id);
                const aDesc = descText ? `<div class="facility-slide-desc">${descText}</div>` : '';
                html += `<div class="facility-slide">`;
                if (a.image) html += `<img src="${a.image}" alt="${aName}" loading="lazy">`;
                html += `<div class="facility-slide-body"><div class="facility-slide-name">${aName}</div>${aDesc}</div>`;
                html += `</div>`;
              });
              html += `</div>`;
              if (cat.items.length > 1) {
                html += `<button class="slider-btn slider-prev">◀</button><button class="slider-btn slider-next">▶</button>`;
                html += `<div class="slider-dots">${cat.items.map((_,i)=>`<button class="slider-dot${i===0?' active':''}" data-idx="${i}"></button>`).join('')}</div>`;
              }

    function slideDayImg(slider, idx) {
      if (typeof slider === 'string') slider = document.getElementById(slider);
      if (!slider) return;
      const total = parseInt(slider.dataset.total) || 1;
      idx = (idx + total) % total;
      slider.dataset.current = idx;
      const slides = slider.querySelector('.day-img-slides');
      if (slides) slides.style.transform = `translateX(-${idx * 100}%)`;
      slider.querySelectorAll('.day-dot').forEach((b, i) => {
        b.style.background = i === idx ? 'var(--navy)' : '#ccc';
        b.classList.toggle('day-dot-active', i === idx);
      });
    }

    function initDaySliders() {
      document.querySelectorAll('.day-img-slider').forEach(slider => {
        // 도트 클릭
        slider.querySelectorAll('.day-dot').forEach((dot, i) => {
          dot.addEventListener('click', () => slideDayImg(slider, i));
        });
        // 터치 스와이프
        const wrap = slider.querySelector('.day-img-wrap');
        if (!wrap) return;
        let _tx = 0, _ty = 0, _sw = false;
        wrap.addEventListener('touchstart', e => {
          _tx = e.touches[0].clientX; _ty = e.touches[0].clientY; _sw = false;
        }, { passive: true });
        wrap.addEventListener('touchmove', e => {
          const dx = e.touches[0].clientX - _tx;
          const dy = e.touches[0].clientY - _ty;
          if (!_sw && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) _sw = true;
          if (_sw) e.preventDefault();
        }, { passive: false });
        wrap.addEventListener('touchend', e => {
          const dx = e.changedTouches[0].clientX - _tx;
          if (_sw && Math.abs(dx) > 40) {
            slideDayImg(slider, parseInt(slider.dataset.current || 0) + (dx < 0 ? 1 : -1));
          }
          _sw = false;
        });
        // 마우스 드래그
        let _mx = 0, _mdown = false, _mdist = 0;
        wrap.addEventListener('mousedown', e => { _mdown = true; _mx = e.pageX; _mdist = 0; });
        wrap.addEventListener('mousemove', e => { if (_mdown) _mdist = Math.abs(e.pageX - _mx); });
        wrap.addEventListener('mouseup', e => {
          if (!_mdown) return; _mdown = false;
          const dx = e.pageX - _mx;
          if (_mdist > 40) slideDayImg(slider, parseInt(slider.dataset.current || 0) + (dx < 0 ? 1 : -1));
        });
        wrap.addEventListener('mouseleave', () => { _mdown = false; });
      });
    }

    function initSlider(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const slides = container.querySelector('.facility-slides');
      const dots = container.querySelectorAll('.slider-dot');
      const total = dots.length;
      if (total === 0) return;
      let current = 0;

      function goTo(i) {
        current = (i + total) % total;
        slides.style.transform = `translateX(-${current * 100}%)`;
        dots.forEach((d, idx) => d.classList.toggle('active', idx === current));
      }

      container.querySelector('.slider-prev')?.addEventListener('click', () => goTo(current - 1));
      container.querySelector('.slider-next')?.addEventListener('click', () => goTo(current + 1));
      dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));

      // 터치 스와이프
      let _tx = 0, _ty = 0, _swiping = false;
      slides.addEventListener('touchstart', e => {
        _tx = e.touches[0].clientX;
        _ty = e.touches[0].clientY;
        _swiping = false;
      }, { passive: true });
      slides.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX - _tx;
        const dy = e.touches[0].clientY - _ty;
        // 수평 스와이프가 확실하면 세로 스크롤 막기
        if (!_swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
          _swiping = true;
        }
        if (_swiping) e.preventDefault();
      }, { passive: false });
      slides.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - _tx;
        if (_swiping && Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
        _swiping = false;
      });
    }

  <script>
    // ── Lightbox ──
    let _lbImages = [];
    let _lbIdx = 0;

    function openLightbox(src, caption, allImgs, idx) {
      _lbImages = allImgs || [{ src, caption }];
      _lbIdx = idx ?? 0;
      _renderLb();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      // 키보드
      document.addEventListener('keydown', _lbKey);
    }

    function _renderLb() {
      const item = _lbImages[_lbIdx];
      document.getElementById('lbImg').src = item.src;
      document.getElementById('lbImg').alt = item.caption || '';
      document.getElementById('lbCaption').textContent = item.caption || '';
      const total = _lbImages.length;
      document.getElementById('lbCounter').textContent = total > 1 ? `${_lbIdx + 1} / ${total}` : '';
      const showNav = total > 1;
      document.getElementById('lbPrev').style.display = showNav ? 'flex' : 'none';
      document.getElementById('lbNext').style.display = showNav ? 'flex' : 'none';
    }

    function lbNav(dir) {
      _lbIdx = (_lbIdx + dir + _lbImages.length) % _lbImages.length;
      _renderLb();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lbImg').src = '';
      document.body.style.overflow = '';
      document.removeEventListener('keydown', _lbKey);
    }

    function _lbKey(e) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'ArrowLeft') lbNav(-1);
    }

    // 이벤트 위임 — facility slides + cabin cards 이미지 클릭
    document.addEventListener('click', function(e) {
      const img = e.target.closest('.facility-slide img, .cabin-card img');
      if (!img) return;
      e.stopPropagation();

      // 같은 슬라이더 내 모든 이미지 수집
      const slide = img.closest('.facility-slide, .cabin-card');
      const slider = img.closest('.facility-slider, .cabin-grid');
      let allImgs, idx;

      if (slider) {
        const imgs = [...slider.querySelectorAll('img')].filter(i => i.src && !i.src.includes('data:'));
        allImgs = imgs.map(i => ({ src: i.src, caption: i.alt || '' }));
        idx = imgs.indexOf(img);
      } else {
        allImgs = [{ src: img.src, caption: img.alt || '' }];
        idx = 0;
      }

      openLightbox(img.src, img.alt || '', allImgs, Math.max(0, idx));
    });

    // 스와이프 (모바일)
    let _tsX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', e => { _tsX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('lightbox').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - _tsX;
      if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
    });
  </script>

    // ── 모달 열기/닫기 ──
    function openShareModal() {
      const { url, title } = getShareData();
      document.getElementById('shareTitlePreview').textContent = title;
      document.getElementById('shareUrlText').textContent = url;
      // Web Share API 미지원 시 "더보기" 숨기기
      if (!navigator.share) {
        document.getElementById('shareMoreBtn').style.display = 'none';
      }
      document.getElementById('shareModalBackdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeShareModal() {
      document.getElementById('shareModalBackdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── 카카오톡 공유 ──
    function shareKakao() {
      const { url, title, img } = getShareData();
      if (window.Kakao && Kakao.isInitialized()) {
        Kakao.Share.sendDefault({
          objectType: 'feed',
          content: {
            title: '🚢 ' + title,
            description: '크루즈링크에서 확인해보세요!',
            imageUrl: img,
            link: { mobileWebUrl: url, webUrl: url }
          },
          buttons: [{
            title: '상품 보러가기',
            link: { mobileWebUrl: url, webUrl: url }
          }]
        });
      } else {
        // SDK 미로드 시 카카오 채널로 fallback
        window.open('https://pf.kakao.com/_xgYbJG', '_blank');
      }
      closeShareModal();
    }

    // ── URL 복사 ──
    function copyShareUrl() {
      const url = getShareData().url;
      navigator.clipboard.writeText(url).then(() => {
        showShareToast('✅ 링크가 복사됐습니다!');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = url;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showShareToast('✅ 링크가 복사됐습니다!');
      });
      closeShareModal();
    }

    // ── 문자 전송 ──
    function shareSMS() {
      const { url, title } = getShareData();
      window.location.href = `sms:?body=${encodeURIComponent('🚢 ' + title + '\n' + url)}`;
      closeShareModal();
    }

    // ── 네이티브 공유 (Web Share API) ──
    function shareNative() {
      const { url, title } = getShareData();
      if (navigator.share) {
        navigator.share({ title: '🚢 ' + title, url }).catch(() => {});
      }
      closeShareModal();
    }

    // ── 토스트 ──
    function showShareToast(msg) {
      const t = document.getElementById('shareToast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2200);
    }

    // ── MIB 패널에 공유 버튼 동적 삽입 (모바일) ──
    document.addEventListener('DOMContentLoaded', function() {
      const mibPanel = document.getElementById('mibPanel');
      if (mibPanel) {
        const row = document.createElement('div');
        row.className = 'mib-share-row';
        row.innerHTML = `
          <button class="mib-share-btn" onclick="copyShareUrl()">🔗 링크 복사</button>
          <button class="mib-share-btn" onclick="shareKakao()">💬 카카오 공유</button>
          <button class="mib-share-btn" onclick="shareNative()" id="mibShareMore">📤 더 보내기</button>
        `;
        mibPanel.appendChild(row);
        if (!navigator.share) document.getElementById('mibShareMore').style.display = 'none';
      }
    });

    // ESC 키로 닫기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeShareModal();
    });
  </script>
</body>
</html>
