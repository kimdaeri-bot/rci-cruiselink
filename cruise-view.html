<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>크루즈 상세 - 크루즈링크</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>">
</head>
<body>
  <div id="header"></div>
  <div id="content">
    <div class="loading" style="padding:100px 20px"><div class="loading-spinner"></div><p>크루즈 정보를 불러오는 중...</p></div>
  </div>
  <div id="footer"></div>

  <script src="assets/data/translations.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components.js"></script>
  <script>
    document.getElementById('header').innerHTML = Components.header();
    document.getElementById('footer').innerHTML = Components.footer();

    const ref = new URLSearchParams(location.search).get('ref');
    if (!ref) {
      document.getElementById('content').innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>잘못된 접근입니다</p></div>';
    }

    function stripHtml(html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = html || '';
      return tmp.textContent || '';
    }

    function fmtPrice(v) {
      if (!v) return '-';
      return '$' + parseFloat(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
    }

    async function load() {
      if (!ref) return;
      const content = document.getElementById('content');

      try {
        // ① holiday + shipLive 동시 요청 (로컬 10MB 파일 기다리지 않음)
        const holiday = await API.getHoliday(ref);
        if (!holiday) {
          content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>크루즈 정보를 찾을 수 없습니다</p></div>';
          return;
        }

        const shipSlug = typeof holiday.ship === 'string'
          ? holiday.ship.split('/ships/')[1]?.replace('.json', '')
          : null;

        // holiday + shipLive 병렬 (이미 holiday는 완료됨, shipLive만 대기)
        const shipLive = shipSlug ? await API.getShipLive(shipSlug) : null;

        // ② 로컬 캐시 확인 (이미 캐시된 경우만 — 추가 다운로드 없음)
        let localCruise = null, localShip = null, shipDetail = null;
        if (API._allCruisesCache) {
          localCruise = API._allCruisesCache.find(c => c.ref === ref) || null;
        }
        if (localCruise && API._localShips) {
          localShip = API._localShips.find(s => s.slug === localCruise.shipSlug) || null;
        }
        if (localCruise) {
          shipDetail = await API.getShipDetail(localCruise.shipSlug);
        }

        // ③ 렌더
        if (localCruise && localShip) {
          // 캐시된 로컬 데이터로 즉시 렌더 + 라이브 보완
          renderPage(localCruise, localShip, shipDetail, null);
          initAllSliders();
          renderItinerary(holiday);
          renderPricing(holiday, shipDetail);
          if (shipLive) {
            const liveDetail = normalizeShipLive(shipLive);
            updateShipSection(localCruise, localShip, shipDetail, liveDetail);
          }
        } else {
          // 라이브 API 전용 렌더 (전선사 동일)
          renderFromAPI(holiday, shipDetail, shipLive);
        }
      } catch (e) {
        console.error('API fetch failed:', e);
        content.innerHTML = '<div class="empty-state"><span class="emoji">⚠️</span><p>데이터를 불러올 수 없습니다</p></div>';
      }
    }

    // 라이브 API 데이터 → detail 포맷으로 정규화
    function normalizeShipLive(sl) {
      if (!sl) return null;
      const mapItems = (arr, limit = 30) => (arr || []).slice(0, limit).map(item => ({
        name: item.name || '',
        image: item.images?.[0]?.href || '',
        desc: (item.description || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 150),
      }));
      return {
        dining: mapItems(sl.dining_options, 20),
        entertainment: mapItems(sl.entertainment_types, 30),
        health: mapItems(sl.health_fitness_types, 20),
        kids: mapItems(sl.kid_teen_types, 15),
        deckplans: mapItems(sl.deckplans, 20),
        accommodations: mapItems(sl.accomodation_types, 24),
        // ship facts from live API
        facts: sl.ship_facts || {},
        coverImage: sl.cover_image_href || sl.profile_image_href || '',
        teaser: (sl.teaser || '').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim(),
      };
    }

    // 선박 섹션 라이브 업데이트
    function updateShipSection(c, ship, detail, liveDetail) {
      const section = document.getElementById('ship-detail-section');
      if (!section) return;
      // 라이브 데이터가 더 풍부하면 교체
      const data = liveDetail || detail;
      if (!data) return;
      // facts 우선순위: liveDetail.facts > localShip
      const facts = liveDetail?.facts || {};
      const mergedShip = {
        ...ship,
        launchYear: facts.launch_year || ship.launchYear,
        grossTonnage: facts.gross_tonnage || ship.grossTonnage,
        capacity: facts.capacity || ship.capacity,
        crewCount: facts.crew_count || ship.crewCount,
        length: facts.length || ship.length,
        width: facts.width || ship.width,
        deckCount: facts.deck_count || ship.deckCount,
        cabinCount: facts.cabin_count || ship.cabinCount,
      };
      const newHtml = renderShipSection(c, mergedShip, detail, liveDetail);
      section.outerHTML = newHtml;
      initAllSliders();
    }

    function renderPage(c, ship, detail, holiday) {
      window._cruiseData = c;
      const nights = c.nights;
      const fromPrice = c.priceBalcony || c.priceOutside || c.priceInside;
      const priceStr = fromPrice ? API.formatPrice(fromPrice, c.currency) : '문의';
      const countries = (c.countriesKo || []).join(', ') || (c.countries || []).join(', ');

      document.title = `${c.title} - 크루즈링크`;

      let html = '';

      // === HERO ===
      html += `
      <section class="detail-hero">
        <div class="container">
          <div class="operator-name">${Translations.operatorName(c.operator)} · ${c.shipTitleKo || Translations.shipName(c.shipTitle)}</div>
          <h1>🚢 ${c.title}</h1>
          <div class="meta">
            <span>📅 ${API.formatDateKo(c.dateFrom)} ~ ${API.formatDateKo(c.dateTo)}</span>
            <span>🌙 ${nights}박 ${nights+1}일</span>
            <span>🚢 ${c.shipTitleKo || c.shipTitle}</span>
            <span>🌏 ${countries}</span>
          </div>
          <div class="detail-hero-tags">
            ${(c.hashtags||[]).slice(0,6).map(t => `<span class="hero-tag">${t}</span>`).join('')}
          </div>
          <div class="price-big">${priceStr} <small>/1인 2인기준</small></div>
          <div class="hero-ctas cta-two-center">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 카카오톡 상담</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 온라인 문의</button>
          </div>
        </div>
      </section>`;

      // === MAIN SHIP IMAGE ===
      if (ship.coverImage) {
        html += `<div class="container"><div class="main-ship-image"><img src="${ship.coverImage}" alt="${c.shipTitle}" loading="lazy"></div></div>`;
      }

      // === INFO BAR ===
      html += `
      <div class="container">
        <div class="info-bar">
          <div class="info-bar-item"><div class="label">🚢 선박</div><div class="value">${c.shipTitleKo || c.shipTitle}</div></div>
          <div class="info-bar-item"><div class="label">🌙 기간</div><div class="value">${nights}박 ${nights+1}일</div></div>
          <div class="info-bar-item"><div class="label">🚪 출발/도착</div><div class="value">${c.startsAt?.nameKo || c.startsAt?.name || ''} → ${c.endsAt?.nameKo || c.endsAt?.name || ''}</div></div>
          <div class="info-bar-item"><div class="label">💰 2인1실 기준</div><div class="value" style="color:var(--orange)">${priceStr}</div></div>
        </div>
      </div>`;

      // === ITINERARY PLACEHOLDER ===
      html += `
      <section class="section" id="itinerary-section">
        <div class="container">
          <h2 class="section-title">🗓️ 상세 일정</h2>
          <p class="section-subtitle">${c.portRoute || ''}</p>
          <div id="day-cards-container">
            <div class="loading"><div class="loading-spinner"></div><p>일정 데이터를 불러오는 중...</p></div>
          </div>
        </div>
      </section>`;

      // === SHIP INFO ===
      html += renderShipSection(c, ship, detail);

      // === PRICING PLACEHOLDER ===
      html += `<section class="section" id="pricing-section"></section>`;

      // === INCLUDE/EXCLUDE ===
      html += `
      <section class="section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">📋 포함 / 불포함 사항</h2>
          <div class="checklist-grid" style="margin-top:24px;max-width:700px;margin-left:auto;margin-right:auto">
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">✅ 포함 사항</h3>
              <ul class="checklist included">
                <li>객실 숙박</li>
                <li>메인 레스토랑 & 뷔페 식사 (조식·중식·석식)</li>
                <li>선상 엔터테인먼트 (쇼, 공연, 수영장)</li>
                <li>피트니스 센터</li>
                <li>키즈 & 틴즈 클럽 프로그램</li>
                <li>객실 룸서비스 (기본)</li>
                <li>기항지 셔틀버스 (일부)</li>
              </ul>
            </div>
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">❌ 불포함 사항</h3>
              <ul class="checklist excluded">
                <li>항공편</li>
                <li>스페셜티 레스토랑</li>
                <li>주류 및 음료 패키지</li>
                <li>기항지 관광 (Shore Excursion)</li>
                <li>스파 & 뷰티 트리트먼트</li>
                <li>Wi-Fi 인터넷 패키지</li>
                <li>세탁 서비스</li>
                <li>여행자 보험</li>
              </ul>
            </div>
          </div>
        </div>
      </section>`;

      // === CTA ===
      html += `
      <section class="cta-section">
        <div class="container">
          <h2>이 크루즈가 마음에 드셨나요?</h2>
          <p>크루즈링크 전문 상담원이 최적의 객실과 가격을 안내해드립니다.</p>
          <div class="cta-buttons cta-two">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 카카오톡 상담</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 온라인 문의</button>
          </div>
        </div>
      </section>`;

      content.innerHTML = html;
    }

    function renderShipSection(c, ship, detail, liveDetail = null) {
      // 시설 데이터: detail(로컬) 우선, 없으면 liveDetail(라이브 API)
      const facilityData = (detail?.dining?.length || detail?.entertainment?.length || detail?.deckplans?.length)
        ? detail : liveDetail;
      const shipName = c.shipTitleKo || c.shipTitle;
      const facts = liveDetail?.facts || {};

      // spec 값: liveDetail.facts 우선 → 로컬 ship 폴백
      const launchYear = facts.launch_year || ship?.launchYear;
      const grossTonnage = facts.gross_tonnage || ship?.grossTonnage;
      const capacity = facts.capacity || ship?.capacity;
      const crewCount = facts.crew_count || ship?.crewCount;
      const length = facts.length || ship?.length;
      const width = facts.width || ship?.width;
      const deckCount = facts.deck_count || ship?.deckCount;
      const cabinCount = facts.cabin_count || ship?.cabinCount;

      // teaser: liveDetail.teaser 우선 → Translations 폴백
      const teaser = liveDetail?.teaser
        || Translations.shipTeaser(c.shipTitle, c.shipTitleKo, c.operator, ship?.shipClass, capacity, launchYear)
        || '';

      let html = `
      <section class="section" id="ship-detail-section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">🚢 ${shipName} 소개</h2>
          ${teaser ? `<p class="section-subtitle" style="max-width:800px;margin:0 auto 24px;text-align:center">${teaser}</p>` : ''}
          <div class="spec-grid">`;

      const specs = [
        ['취항연도', launchYear || '-'],
        ['총톤수', grossTonnage ? Number(grossTonnage).toLocaleString() + 't' : '-'],
        ['최대정원', capacity ? Number(capacity).toLocaleString() + '명' : '-'],
        ['승무원', crewCount ? Number(crewCount).toLocaleString() + '명' : '-'],
        ['전장', length ? length + 'm' : '-'],
        ['전폭', width ? width + 'm' : '-'],
        ['데크', deckCount ? deckCount + '개' : '-'],
        ['객실', cabinCount ? Number(cabinCount).toLocaleString() + '실' : '-'],
      ];
      specs.forEach(([label, value]) => {
        html += `<div class="spec-item"><div class="spec-value">${value}</div><div class="spec-label">${label}</div></div>`;
      });
      html += `</div>`;

      // ── 시설 탭 (다이닝 / 엔터테인먼트 / 스파 / 키즈 / 덱플랜) ──
      if (facilityData) {
        const tabs = [];
        if (facilityData.dining?.length)        tabs.push({id:'dining', label:`🍽️ 다이닝 (${facilityData.dining.length})`,       items: facilityData.dining});
        if (facilityData.entertainment?.length)  tabs.push({id:'ent',    label:`🎭 엔터테인먼트 (${facilityData.entertainment.length})`, items: facilityData.entertainment});
        if (facilityData.health?.length)         tabs.push({id:'health', label:`💆 스파·피트니스 (${facilityData.health.length})`,  items: facilityData.health});
        if (facilityData.kids?.length)           tabs.push({id:'kids',   label:`👶 키즈 (${facilityData.kids.length})`,            items: facilityData.kids});
        if (facilityData.deckplans?.length)      tabs.push({id:'decks',  label:`📐 덱플랜 (${facilityData.deckplans.length})`,     items: facilityData.deckplans});

        if (tabs.length) {
          html += `<div class="ship-tabs" style="margin-top:40px">`;
          html += `<div class="tabs" style="flex-wrap:wrap;gap:4px 0">`;
          tabs.forEach((t, i) => {
            html += `<button class="tab-btn ${i===0?'active':''}" onclick="switchShipTab(this,'ship-panel-${t.id}')">${t.label}</button>`;
          });
          html += `</div>`;

          tabs.forEach((t, i) => {
            const sliderId = 'slider-' + t.id;
            const items = t.items.slice(0, t.id === 'decks' ? 30 : 20);
            html += `<div class="tab-content ${i===0?'active':''}" id="ship-panel-${t.id}">`;
            html += `<div class="facility-slider" id="${sliderId}">`;
            html += `<div class="facility-slides">`;
            items.forEach(item => {
              const tr = Translations.facilityKo?.[item.name];
              const name = tr ? tr.name : item.name;
              // desc: facilityKo 번역 우선 → 라이브 desc 폴백
              const desc = tr?.desc || item.desc || '';
              html += `<div class="facility-slide">`;
              if (item.image) html += `<img src="${item.image}" alt="${name}" loading="lazy">`;
              html += `<div class="facility-slide-body"><div class="facility-slide-name">${name}</div>`;
              if (desc) html += `<div class="facility-slide-desc">${desc}</div>`;
              html += `</div></div>`;
            });
            html += `</div>`;
            if (items.length > 1) {
              html += `<button class="slider-btn slider-prev">◀</button><button class="slider-btn slider-next">▶</button>`;
              html += `<div class="slider-dots">${items.map((_, idx) => `<button class="slider-dot${idx===0?' active':''}" data-idx="${idx}"></button>`).join('')}</div>`;
            }
            html += `</div></div>`;
          });
          html += `</div>`;
        }

        // ── 객실 타입 그리드 ──
        if (facilityData.accommodations?.length) {
          html += `<h3 style="font-size:1.2rem;font-weight:700;color:var(--navy);margin:40px 0 16px">🛏️ 객실 타입</h3>`;
          html += `<div class="cabin-grid">`;
          facilityData.accommodations.slice(0, 12).forEach(a => {
            const aName = Translations.accommodationName(a.name);
            const aDesc = a.desc ? `<p style="font-size:0.78rem;color:var(--gray-600);margin:4px 0 0;line-height:1.4">${a.desc}</p>` : '';
            html += `<div class="cabin-card">`;
            if (a.image) html += `<img src="${a.image}" alt="${aName}" loading="lazy">`;
            html += `<div class="cabin-card-body"><h4>${aName}</h4>${aDesc}</div>`;
            html += `</div>`;
          });
          html += `</div>`;
        }
      }

      html += `</div></section>`;
      return html;
    }

    function renderItinerary(holiday) {
      const container = document.getElementById('day-cards-container');
      if (!container || !holiday.itinerary?.days) {
        if (container) container.innerHTML = '<p style="text-align:center;color:#999">일정 데이터가 없습니다.</p>';
        return;
      }

      let html = '<div class="day-cards">';
      for (const day of holiday.itinerary.days) {
        const loc = day.locations?.[0];
        const isSeaDay = !loc || day.day_type?.includes('SEA') || day.day_name?.toLowerCase().includes('at sea');

        if (isSeaDay) {
          html += `
          <div class="day-card sea-day">
            <div class="day-card-header">
              <span class="day-num">DAY ${day.day}</span>
              <span class="day-port">🌊 종일 항해</span>
              <span class="day-time"></span>
            </div>
            <div class="day-card-body" style="text-align:center;color:var(--gray-500)">
              <p>오늘은 종일 항해일입니다. 수영장, 스파, 카지노, 레스토랑 등 선박의 다양한 시설과 엔터테인먼트를 즐기며 편안한 하루를 보내세요.</p>
            </div>
          </div>`;
        } else {
          const portName = Translations.portName(loc.name);
          const countryName = Translations.countryName(loc.country);
          const arrTime = loc.arrival_time || '';
          const depTime = loc.departure_time || '';
          const timeStr = arrTime && depTime ? `${arrTime} 입항 ~ ${depTime} 출항` : depTime ? `${depTime} 출항` : arrTime ? `${arrTime} 입항` : '';
          const portImages = loc.widgety_data?.images || loc.operator_data?.images || [];
          const mainImg = portImages[0]?.href;
          const descKo = Translations.portDesc(loc.name);
          const desc = descKo || `아름다운 기항지 ${portName}에서 특별한 시간을 보내세요.`;

          html += `
          <div class="day-card">
            <div class="day-card-header">
              <span class="day-num">DAY ${day.day}</span>
              <span class="day-port">📍 ${portName}${countryName ? ', ' + countryName : ''}</span>
              <span class="day-time">${timeStr ? '⏰ ' + timeStr : ''}</span>
            </div>
            ${mainImg ? `<div class="day-card-img-wrap"><img src="${mainImg}" alt="${portName}" class="day-card-main-img" loading="lazy"></div>` : ''}
            <div class="day-card-body">
              ${desc ? `<p class="port-desc">${desc}</p>` : ''}
            </div>
          </div>`;
        }
      }
      html += '</div>';
      container.innerHTML = html;
    }

    function renderPricing(holiday, shipDetail) {
      const section = document.getElementById('pricing-section');
      if (!section) return;

      const prices = holiday.headline_prices?.cruise;
      if (!prices) return;

      const double = prices.double;
      const single = prices.single;
      const triple = prices.triple;

      let html = `
      <div class="container">
        <h2 class="section-title">💰 객실 & 요금</h2>
        <p class="section-subtitle">1인 기준 요금 (2인 1실 기준, 세금/항만료 별도)</p>
        <table class="price-table">
          <thead><tr><th>객실 타입</th><th>2인 1실</th><th>1인 1실</th><th>3인 1실</th></tr></thead>
          <tbody>`;

      const types = [
        {key:'inside', label:'🚪 내측 (Inside)'},
        {key:'outside', label:'🪟 오션뷰 (Outside)'},
        {key:'balcony', label:'🌅 발코니 (Balcony)'},
        {key:'suite', label:'👑 스위트 (Suite)'},
      ];
      types.forEach(t => {
        const dp = double?.['from_' + t.key];
        const sp = single?.['from_' + t.key];
        const tp = triple?.['from_' + t.key];
        if (dp || sp || tp) {
          html += `<tr><td class="room-type">${t.label}</td><td style="color:var(--orange);font-weight:700">${fmtPrice(dp)}</td><td>${fmtPrice(sp)}</td><td>${fmtPrice(tp)}</td></tr>`;
        }
      });

      html += `</tbody></table>

    function renderFromAPI(holiday, shipDetail, shipLive) {
      // Full page render from live API data (no local cruise in cruises.json)
      const nights = holiday.cruise_nights || holiday.duration_days || 0;
      const opName = Translations.operatorName(holiday.operator_title || '');
      const shipName = Translations.shipName(holiday.ship_title || '');
      const price = holiday.headline_prices?.cruise?.double;
      const fromPrice = price?.from_balcony || price?.from_outside || price?.from_inside;
      const priceStr = fromPrice ? API.formatPrice(fromPrice) : '문의';
      const countries = (holiday.countries || []).map(c => Translations.countryName(c)).join(', ');
      const route = API.routeString(holiday.itinerary);
      const coverImg = shipLive?.cover_image_href || '';
      const facts = shipLive?.ship_facts || {};
      const cruiseTitle = holiday.name || `${Translations.portName(holiday.starts_at?.name||'')} 출발 ${nights}박 크루즈`;

      window._cruiseData = {
        title: cruiseTitle,
        operator: holiday.operator_title,
        shipTitle: holiday.ship_title,
        departureDate: holiday.date_from,
        nights,
        ref
      };

      document.title = `${cruiseTitle} - 크루즈링크`;

      let html = `
      <section class="detail-hero">
        <div class="container">
          <div class="operator-name">${opName} · ${shipName}</div>
          <h1>🚢 ${cruiseTitle}</h1>
          <div class="meta">
            <span>📅 ${API.formatDateKo(holiday.date_from)} ~ ${API.formatDateKo(holiday.date_to)}</span>
            <span>🌙 ${nights}박 ${parseInt(nights)+1}일</span>
            <span>🚢 ${shipName}</span>
            <span>🌏 ${countries}</span>
          </div>
          <div class="price-big">${priceStr} <small>/1인 2인기준</small></div>
          <div class="hero-ctas cta-two-center">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 카카오톡 상담</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 온라인 문의</button>
          </div>
        </div>
      </section>`;

      // Cover image
      if (coverImg) {
        html += `<div class="container"><div class="main-ship-image"><img src="${coverImg}" alt="${shipName}" loading="lazy"></div></div>`;
      }

      // Info bar
      html += `
      <div class="container">
        <div class="info-bar">
          <div class="info-bar-item"><div class="label">🚢 선박</div><div class="value">${shipName}</div></div>
          <div class="info-bar-item"><div class="label">🌙 기간</div><div class="value">${nights}박 ${parseInt(nights)+1}일</div></div>
          <div class="info-bar-item"><div class="label">🚪 출발/도착</div><div class="value">${Translations.portName(holiday.starts_at?.name||'')} → ${Translations.portName(holiday.ends_at?.name||'')}</div></div>
          <div class="info-bar-item"><div class="label">💰 2인1실 기준</div><div class="value" style="color:var(--orange)">${priceStr}</div></div>
        </div>
      </div>`;

      // Itinerary placeholder
      html += `
      <section class="section" id="itinerary-section">
        <div class="container">
          <h2 class="section-title">🗓️ 상세 일정</h2>
          <p class="section-subtitle">${route}</p>
          <div id="day-cards-container">
            <div class="loading"><div class="loading-spinner"></div><p>일정 데이터를 불러오는 중...</p></div>
          </div>
        </div>
      </section>`;

      // Ship section — renderShipSection()으로 통합 (모든 선사 동일 디자인)
      const liveDetail = normalizeShipLive(shipLive);
      const cruiseProxy = {
        shipTitle: holiday.ship_title || '',
        shipTitleKo: Translations.shipName?.(holiday.ship_title || '') || holiday.ship_title || '',
        operator: holiday.operator_title || '',
      };
      html += renderShipSection(cruiseProxy, {}, null, liveDetail);

      // Pricing placeholder
      html += `<section class="section" id="pricing-section"></section>`;

      // Include / Exclude
      html += `
      <section class="section" style="background:var(--gray-50)">
        <div class="container">
          <h2 class="section-title">📋 포함 / 불포함 사항</h2>
          <div class="checklist-grid" style="margin-top:24px;max-width:700px;margin-left:auto;margin-right:auto">
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">✅ 포함 사항</h3>
              <ul class="checklist included">
                <li>객실 숙박</li>
                <li>메인 레스토랑 & 뷔페 식사 (조식·중식·석식)</li>
                <li>선상 엔터테인먼트 (쇼, 공연, 수영장)</li>
                <li>피트니스 센터</li>
                <li>키즈 & 틴즈 클럽 프로그램</li>
                <li>객실 룸서비스 (기본)</li>
                <li>기항지 셔틀버스 (일부)</li>
              </ul>
            </div>
            <div>
              <h3 style="color:var(--navy);margin-bottom:16px">❌ 불포함 사항</h3>
              <ul class="checklist excluded">
                <li>항공편</li>
                <li>스페셜티 레스토랑</li>
                <li>주류 및 음료 패키지</li>
                <li>기항지 관광 (Shore Excursion)</li>

      // CTA
      html += `

          <p>크루즈링크 전문 상담원이 최적의 객실과 가격을 안내해드립니다.</p>
          <div class="cta-buttons cta-two">
            <a href="https://pf.kakao.com/_xgYbJG" target="_blank" class="btn btn-orange">💬 카카오톡 상담</a>
            <button class="btn btn-white-solid" onclick="openInquiry()">📋 온라인 문의</button>
          </div>
        </div>
      </section>`;

      content.innerHTML = html;
      renderItinerary(holiday);
      renderPricing(holiday, shipDetail);
      initAllSliders();
    }

    function initSlider(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      const slides = container.querySelector('.facility-slides');
      const dots = container.querySelectorAll('.slider-dot');
      const total = dots.length;
      if (total === 0) return;
      let current = 0;
      function goTo(i) {
        current = (i + total) % total;
        slides.style.transform = `translateX(-${current * 100}%)`;
        dots.forEach((d, idx) => d.classList.toggle('active', idx === current));
      }
      container.querySelector('.slider-prev')?.addEventListener('click', () => goTo(current - 1));
      container.querySelector('.slider-next')?.addEventListener('click', () => goTo(current + 1));
      dots.forEach((d, i) => d.addEventListener('click', () => goTo(i)));
    }

    function initAllSliders() {
      document.querySelectorAll('.facility-slider').forEach(el => initSlider(el.id));
    }

    function switchShipTab(el, panelId) {
      el.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const parent = el.closest('.ship-tabs');
      parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(panelId)?.classList.add('active');
    }

    load();

    /* ── Inquiry Modal ── */
    function openInquiry() {
      const c = window._cruiseData;
      if (c) {
        const title = c.title || c.titleKo || '';
        const ship = c.shipTitleKo || Translations.shipName(c.shipTitle || '');
        const op = Translations.operatorName(c.operator || '');
        const price = c.priceBalcony || c.priceOutside || c.priceInside;
        const route = c.portRouteKo || c.portRoute || '';
        document.getElementById('modalProductName').textContent = title;
        document.getElementById('modalProductDetail').innerHTML =
          `${op} · ${ship}<br>출발: ${c.dateFrom || c.departureDate || ''} / ${c.nights || ''}박${price ? ' / $'+price+'~' : ''}`;
        document.getElementById('f_product').value = title;
        document.getElementById('f_cruiseline').value = c.operator || '';
        document.getElementById('f_ship').value = ship;
        document.getElementById('f_date').value = c.dateFrom || c.departureDate || '';
        document.getElementById('f_ports').value = route;
        document.getElementById('f_price').value = price ? '$'+price+'~' : '문의';
        document.getElementById('f_ref').value = c.ref || '';
      }
      document.getElementById('inquiryModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeInquiry() {
      document.getElementById('inquiryModal').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('click', e => {
      if (e.target.id === 'inquiryModal') closeInquiry();
    });
    function submitInquiry(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = '전송 중...';

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = 'https://formsubmit.co/ajax/info@cruiselink.co.kr';

      const fd = {
        _subject: `[크루즈링크] ${document.getElementById('f_product').value} - ${document.getElementById('f_name').value}님`,
        '크루즈 상품': document.getElementById('f_product').value,
        '선사': document.getElementById('f_cruiseline').value,
        '선박': document.getElementById('f_ship').value,
        '출발일': document.getElementById('f_date').value,
        '일정': document.getElementById('f_ports').value,
        '참고가격': document.getElementById('f_price').value,
        'Ref': document.getElementById('f_ref').value,
        '고객 이름': document.getElementById('f_name').value,
        '고객 이메일': document.getElementById('f_email').value,
        '고객 연락처': document.getElementById('f_phone').value,
        '인원': document.getElementById('f_pax').value,
        '희망 객실': document.getElementById('f_cabin').value,
        '요청사항': document.getElementById('f_message').value || '없음',
      };

      fetch('https://formsubmit.co/ajax/info@cruiselink.co.kr', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
        body: JSON.stringify(fd)
      })
      .then(r => r.json())
      .then(data => {
        document.getElementById('formStatus').innerHTML =
          '<div style="background:#e8f5e9;padding:12px;border-radius:8px;color:#2e7d32;font-size:0.9rem">✅ 문의가 접수되었습니다.<br>입력하신 이메일로 견적서를 회신드리겠습니다.</div>';
        document.getElementById('inquiryForm').style.display = 'none';
        btn.style.display = 'none';
      })
      .catch(() => {
        document.getElementById('formStatus').innerHTML =
          '<div style="background:#e8f5e9;padding:12px;border-radius:8px;color:#2e7d32;font-size:0.9rem">✅ 문의가 접수되었습니다.<br>입력하신 이메일로 견적서를 회신드리겠습니다.</div>';
        document.getElementById('inquiryForm').style.display = 'none';
        btn.style.display = 'none';
      });
    }
  </script>

  <!-- Inquiry Modal -->

  <!-- Lightbox -->
  <div id="lightbox" style="
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.92); align-items:center; justify-content:center;
    flex-direction:column; padding:16px; box-sizing:border-box;
    cursor:zoom-out;
  " onclick="if(event.target===this) closeLightbox()">
    <button id="lbClose" style="
      position:absolute; top:12px; right:16px; background:none; border:none;
      color:#fff; font-size:2rem; line-height:1; cursor:pointer; z-index:1;
      padding:4px 10px; opacity:0.85;
    " onclick="closeLightbox()">&times;</button>
    <button id="lbPrev" style="
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      background:rgba(255,255,255,0.15); border:none; color:#fff;
      font-size:1.8rem; width:44px; height:44px; border-radius:50%;
      cursor:pointer; display:none; align-items:center; justify-content:center;
    " onclick="lbNav(-1);event.stopPropagation()">‹</button>
    <button id="lbNext" style="
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:rgba(255,255,255,0.15); border:none; color:#fff;
      font-size:1.8rem; width:44px; height:44px; border-radius:50%;
      cursor:pointer; display:none; align-items:center; justify-content:center;
    " onclick="lbNav(1);event.stopPropagation()">›</button>
    <img id="lbImg" src="" alt="" style="
      max-width:100%; max-height:calc(100vh - 80px); object-fit:contain;
      border-radius:6px; box-shadow:0 8px 40px rgba(0,0,0,0.5);
      touch-action:pinch-zoom;
    " onclick="event.stopPropagation()">
    <div id="lbCaption" style="
      color:#fff; font-size:0.9rem; margin-top:12px; text-align:center;
      opacity:0.85; max-width:600px;
    "></div>
    <div id="lbCounter" style="
      color:#aaa; font-size:0.8rem; margin-top:4px;
    "></div>
  </div>

  <style>
    .facility-slide img, .cabin-card img { cursor: zoom-in; }
    .facility-slide img:hover, .cabin-card img:hover { opacity: 0.9; }
    #lightbox.open { display:flex !important; }
  </style>

  <script>
    // ── Lightbox ──
    let _lbImages = [];
    let _lbIdx = 0;

    function openLightbox(src, caption, allImgs, idx) {
      _lbImages = allImgs || [{ src, caption }];
      _lbIdx = idx ?? 0;
      _renderLb();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
      // 키보드
      document.addEventListener('keydown', _lbKey);
    }

    function _renderLb() {
      const item = _lbImages[_lbIdx];
      document.getElementById('lbImg').src = item.src;
      document.getElementById('lbImg').alt = item.caption || '';
      document.getElementById('lbCaption').textContent = item.caption || '';
      const total = _lbImages.length;
      document.getElementById('lbCounter').textContent = total > 1 ? `${_lbIdx + 1} / ${total}` : '';
      const showNav = total > 1;
      document.getElementById('lbPrev').style.display = showNav ? 'flex' : 'none';
      document.getElementById('lbNext').style.display = showNav ? 'flex' : 'none';
    }

    function lbNav(dir) {
      _lbIdx = (_lbIdx + dir + _lbImages.length) % _lbImages.length;
      _renderLb();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.getElementById('lbImg').src = '';
      document.body.style.overflow = '';
      document.removeEventListener('keydown', _lbKey);
    }

    function _lbKey(e) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') lbNav(1);
      if (e.key === 'ArrowLeft') lbNav(-1);
    }

    // 이벤트 위임 — facility slides + cabin cards 이미지 클릭
    document.addEventListener('click', function(e) {
      const img = e.target.closest('.facility-slide img, .cabin-card img');
      if (!img) return;
      e.stopPropagation();

      // 같은 슬라이더 내 모든 이미지 수집
      const slide = img.closest('.facility-slide, .cabin-card');
      const slider = img.closest('.facility-slider, .cabin-grid');
      let allImgs, idx;

      if (slider) {
        const imgs = [...slider.querySelectorAll('img')].filter(i => i.src && !i.src.includes('data:'));
        allImgs = imgs.map(i => ({ src: i.src, caption: i.alt || '' }));
        idx = imgs.indexOf(img);
      } else {
        allImgs = [{ src: img.src, caption: img.alt || '' }];
        idx = 0;
      }

      openLightbox(img.src, img.alt || '', allImgs, Math.max(0, idx));
    });

    // 스와이프 (모바일)
    let _tsX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', e => { _tsX = e.touches[0].clientX; }, { passive: true });
    document.getElementById('lightbox').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - _tsX;
      if (Math.abs(dx) > 50) lbNav(dx < 0 ? 1 : -1);
    });
  </script>
